name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build:packages || true

      - name: Build frontend
        run: cd apps/desktop && npx vite build

      - name: Install server production deps
        run: cd apps/server && npm install --production --ignore-scripts

      - name: Install Electron dependencies
        run: cd apps/electron && npm install

      - name: Build macOS DMG
        run: cd apps/electron && npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-macOS
          path: apps/electron/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build:packages || true

      - name: Build frontend
        run: cd apps/desktop && npx vite build

      - name: Install server production deps
        run: cd apps/server && npm install --production --ignore-scripts

      - name: Install Electron dependencies
        run: cd apps/electron && npm install

      - name: Build Windows installer
        run: cd apps/electron && npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-Windows
          path: apps/electron/dist/*.exe
